name: Test and deploy seismology dashboard

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate deterministic sample catalog
        run: python scripts/generate_sample_catalog.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Export dashboard data
        run: python scripts/export_web_data.py

      - name: Validate generated site
        run: |
          test -f site/index.html
          test -f site/data/summary.json
          python -m compileall src scripts

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [build, deploy]
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create deployment report issue
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          body=$(cat <<EOF
          Automated deployment report for workflow run #${GITHUB_RUN_NUMBER}.

          - Build: ${BUILD_RESULT}
          - Pages deployment: ${DEPLOY_RESULT}
          - Page URL: ${PAGE_URL:-not available}
          - Commit: ${GITHUB_SHA}
          EOF
          )
          gh issue create \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Deployment report #${GITHUB_RUN_NUMBER}" \
            --body "$body"
